name: saydin
description: "Saydın - Ya Alsaydım? finansal hesaplama uygulaması."
publish_to: 'none'
# CI bu versiyonu override eder (conventional commits'ten hesaplar).
# Lokal geliştirme için referans değer.
version: 0.1.1+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Network
  dio: ^5.8.0+1

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Utils
  intl: ^0.20.2
  get_it: ^8.0.3
  uuid: ^4.5.1

  # Charts
  fl_chart: ^0.70.2

  # Sharing
  share_plus: ^10.1.4
  path_provider: ^2.1.5

  # Observability
  sentry_flutter: ^8.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
