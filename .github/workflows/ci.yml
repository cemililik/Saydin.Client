name: CI/CD

on:
  push:
    branches: [test, main]
  pull_request:
    branches: [development, test, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.4"

# ── Versiyon Yönetimi ─────────────────────────────────────────────────────────
#
# Semantic version (X.Y.Z) → git tag'lerinden + conventional commits'ten otomatik hesaplanır.
# Build number             → github.run_number (otomatik, her zaman artan).
#
# Conventional Commit kuralları:
#   feat:             → MINOR artışı (0.1.0 → 0.2.0)
#   fix:, perf:, vb.  → PATCH artışı (0.1.0 → 0.1.1)
#   feat!:, fix!:     → MAJOR artışı (0.1.0 → 1.0.0)
#   BREAKING CHANGE:  → MAJOR artışı (commit body/footer'da)
#   chore:, docs:, ci:, style:, refactor:, test: → versiyon artışı YOK
#
# Tag yoksa fallback: pubspec.yaml'daki versiyon kullanılır.
#
# Branch → ortam eşleşmesi:
#   development / PR  → APP_ENV=development, API_URL=vars.API_URL_STAGING
#   test              → APP_ENV=staging,     API_URL=vars.API_URL_STAGING
#   main              → APP_ENV=production,  API_URL=vars.API_URL_PRODUCTION
#
# GitHub Repository Variables (Settings → Secrets and variables → Variables):
#   API_URL_STAGING    = https://api-staging.saydin.app
#   API_URL_PRODUCTION = https://api.saydin.app
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Sürüm bilgisini hesapla (conventional commits) ─────────────────────────
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.ver.outputs.version_name }}
      build_number: ${{ github.run_number }}
      bumped: ${{ steps.ver.outputs.bumped }}
      commits: ${{ steps.commits.outputs.log }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # tüm geçmiş ve tag'ler için

      - name: Calculate version from conventional commits
        id: ver
        run: |
          # ── Son versiyon tag'ini bul ──────────────────────────────────────
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            # Tag yoksa pubspec.yaml'dan oku (fallback)
            CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
            echo "ℹ️  Tag bulunamadı, pubspec.yaml'dan fallback: $CURRENT"
            echo "version_name=$CURRENT" >> $GITHUB_OUTPUT
            echo "bumped=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Tag'den versiyon çıkar (v0.1.1 → 0.1.1)
          CURRENT="${LATEST_TAG#v}"
          # rc suffix varsa kaldır (v0.1.1-rc.42 → 0.1.1)
          CURRENT="${CURRENT%%-rc.*}"
          echo "📌 Son tag: $LATEST_TAG → versiyon: $CURRENT"

          # ── Commit'leri analiz et ─────────────────────────────────────────
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          BUMP="none"
          while IFS= read -r MSG; do
            # BREAKING CHANGE → major
            if echo "$MSG" | grep -qE '^[a-z]+(\(.+\))?!:|BREAKING CHANGE'; then
              BUMP="major"
              break
            fi
            # feat → minor (major'dan küçük, override etme)
            if echo "$MSG" | grep -qE '^feat(\(.+\))?:'; then
              [ "$BUMP" != "major" ] && BUMP="minor"
            fi
            # fix, perf, revert → patch
            if echo "$MSG" | grep -qE '^(fix|perf|revert)(\(.+\))?:'; then
              [ "$BUMP" = "none" ] && BUMP="patch"
            fi
          done < <(git log "$LATEST_TAG"..HEAD --pretty=format:"%s" 2>/dev/null)

          # ── Versiyon artır ────────────────────────────────────────────────
          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          elif [ "$BUMP" = "patch" ]; then
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "🔄 Bump: $BUMP → $CURRENT → $NEW_VERSION"
          echo "version_name=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bumped=$( [ "$BUMP" != "none" ] && echo true || echo false )" >> $GITHUB_OUTPUT

      - name: Collect commits since last tag
        id: commits
        run: |
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -n "$LATEST_TAG" ]; then
            LOG=$(git log "$LATEST_TAG"..HEAD --pretty=format:"- %s" 2>/dev/null | head -30)
          else
            LOG=$(git log --pretty=format:"- %s" -20 2>/dev/null)
          fi
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "log<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT

  # ── Analyze + Test ─────────────────────────────────────────────────────────
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Dart format check
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Flutter analyze
        run: flutter analyze --fatal-infos

      - name: Flutter test
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  # ── Android Debug Build (development push + tüm PR'lar) ───────────────────
  build-android:
    name: Build Android APK (Debug)
    runs-on: ubuntu-latest
    needs: [version, analyze-and-test]
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/development')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Pre-install CMake
        run: yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

      - name: Build APK (debug)
        run: |
          flutter build apk --debug \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }} \
            --dart-define=API_BASE_URL=${{ vars.API_URL_STAGING }} \
            --dart-define=APP_ENV=development

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: saydin-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ── iOS Debug Build (development push + tüm PR'lar) ──────────────────────
  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-15
    needs: [version, analyze-and-test]
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/development')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --debug --no-codesign \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }} \
            --dart-define=API_BASE_URL=${{ vars.API_URL_STAGING }} \
            --dart-define=APP_ENV=development

  # ── AI Release Notes (Gemini) ──────────────────────────────────────────────
  release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    needs: version
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/test' || github.ref == 'refs/heads/main')
    outputs:
      notes_tr: ${{ steps.generate.outputs.notes_tr }}
      notes_en: ${{ steps.generate.outputs.notes_en }}
    steps:
      - name: Generate release notes with Gemini
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          COMMITS: ${{ needs.version.outputs.commits }}
          VERSION: ${{ needs.version.outputs.version_name }}
        run: |
          # ── Gemini API key yoksa fallback ──────────────────────────────
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "⚠️  GEMINI_API_KEY yok, commit listesi kullanılacak"
            FALLBACK=$(echo "$COMMITS" | head -10)
            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "notes_tr<<$EOF_MARKER" >> $GITHUB_OUTPUT
            echo "$FALLBACK" >> $GITHUB_OUTPUT
            echo "$EOF_MARKER" >> $GITHUB_OUTPUT
            echo "notes_en<<$EOF_MARKER" >> $GITHUB_OUTPUT
            echo "$FALLBACK" >> $GITHUB_OUTPUT
            echo "$EOF_MARKER" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ── Gemini'ye istek gönder ─────────────────────────────────────
          SEPARATOR="=====LANG_SEPARATOR====="
          read -r -d '' PROMPT << 'PROMPT_END' || true
          Asagidaki git commit mesajlarindan mobil uygulama icin kisa ve kullanici dostu release note olustur.

          Kurallar:
          - Teknik detay yazma (commit hash, refactor, chore gibi seyler yazma)
          - Kullanicinin anlayacagi dilde yaz
          - Maksimum 500 karakter (Play Store limiti)
          - Her maddeyi yeni satirda yaz
          - Emoji kullan (yeni ozellik icin yildiz, hata duzeltme icin bocek, iyilestirme icin parildama emojisi)
          - chore, docs, ci, style, refactor, test tipindeki commitleri ATLA
          - Sadece feat ve fix commitleri dahil et
          - Eger hic feat/fix yoksa genel bir iyilestirme notu yaz

          Once TURKCE versiyonu yaz, sonra tam olarak su ayiraci yaz: =====LANG_SEPARATOR=====
          Sonra INGILIZCE versiyonu yaz.
          PROMPT_END
          PROMPT="${PROMPT}

          Versiyon: v${VERSION}

          Commitler:
          ${COMMITS}"

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            '{contents: [{parts: [{text: $prompt}]}], generationConfig: {temperature: 0.7, maxOutputTokens: 1024}}')

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          # ── Yanıtı parse et ────────────────────────────────────────────
          FULL_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$FULL_TEXT" ]; then
            echo "⚠️  Gemini yanıt vermedi, fallback kullanılıyor"
            FULL_TEXT=$(echo "$COMMITS" | head -10)
            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "notes_tr<<$EOF_MARKER" >> $GITHUB_OUTPUT
            echo "$FULL_TEXT" >> $GITHUB_OUTPUT
            echo "$EOF_MARKER" >> $GITHUB_OUTPUT
            echo "notes_en<<$EOF_MARKER" >> $GITHUB_OUTPUT
            echo "$FULL_TEXT" >> $GITHUB_OUTPUT
            echo "$EOF_MARKER" >> $GITHUB_OUTPUT
            exit 0
          fi

          # TR ve EN'yi ayır
          NOTES_TR=$(echo "$FULL_TEXT" | sed "/${SEPARATOR}/,\$d" | head -c 500)
          NOTES_EN=$(echo "$FULL_TEXT" | sed "1,/${SEPARATOR}/d" | head -c 500)

          # EN boşsa TR'yi kullan
          [ -z "$NOTES_EN" ] && NOTES_EN="$NOTES_TR"

          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "notes_tr<<$EOF_MARKER" >> $GITHUB_OUTPUT
          echo "$NOTES_TR" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER" >> $GITHUB_OUTPUT

          EOF_MARKER2=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "notes_en<<$EOF_MARKER2" >> $GITHUB_OUTPUT
          echo "$NOTES_EN" >> $GITHUB_OUTPUT
          echo "$EOF_MARKER2" >> $GITHUB_OUTPUT

          echo "✅ Release notes oluşturuldu"
          echo "--- TR ---"
          echo "$NOTES_TR"
          echo "--- EN ---"
          echo "$NOTES_EN"

  # ── Android Release AAB (test + main push) ────────────────────────────────
  release-android:
    name: Release Android AAB
    runs-on: ubuntu-latest
    needs: [version, analyze-and-test, release-notes]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/test' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Pre-install CMake
        run: yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

      - name: Prepare & verify signing
        env:
          KEYSTORE_B64:     ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD:   ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS:        ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:     ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # ── 1. Secret varlık kontrolü ──────────────────────────────────────
          missing=""
          [ -z "$KEYSTORE_B64" ]   && missing="$missing\n  - ANDROID_KEYSTORE_BASE64"
          [ -z "$STORE_PASSWORD" ] && missing="$missing\n  - ANDROID_STORE_PASSWORD"
          [ -z "$KEY_ALIAS" ]      && missing="$missing\n  - ANDROID_KEY_ALIAS"
          [ -z "$KEY_PASSWORD" ]   && missing="$missing\n  - ANDROID_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            printf "❌ Eksik secret'lar:%b\n" "$missing"
            exit 1
          fi
          echo "✅ [1/4] Tüm secret'lar mevcut"

          # ── 2. Base64 decode ───────────────────────────────────────────────
          printf '%s' "$KEYSTORE_B64" | base64 --decode --ignore-garbage \
            > android/saydin-release.jks
          FILESIZE=$(wc -c < android/saydin-release.jks)
          echo "    Keystore boyutu: ${FILESIZE} bytes"
          if [ "$FILESIZE" -lt 100 ]; then
            echo "❌ [2/4] Decode başarısız — dosya ${FILESIZE} bytes, ANDROID_KEYSTORE_BASE64 hatalı"
            exit 1
          fi
          echo "✅ [2/4] Keystore decode edildi (${FILESIZE} bytes)"

          # ── 3. Store password + alias doğrulama ───────────────────────────
          if ! keytool -list \
                -keystore android/saydin-release.jks \
                -storepass "$STORE_PASSWORD" \
                -alias "$KEY_ALIAS" > /dev/null 2>&1; then
            echo "❌ [3/4] STORE_PASSWORD veya KEY_ALIAS hatalı"
            exit 1
          fi
          echo "✅ [3/4] Store password ve alias doğrulandı"

          # ── 4. Key password doğrulama ──────────────────────────────────────
          if ! keytool -exportcert \
                -keystore android/saydin-release.jks \
                -storepass "$STORE_PASSWORD" \
                -alias "$KEY_ALIAS" \
                -keypass "$KEY_PASSWORD" > /dev/null 2>&1; then
            echo "❌ [4/4] KEY_PASSWORD hatalı"
            exit 1
          fi
          echo "✅ [4/4] Key password doğrulandı"
          echo ""
          echo "🎉 Signing doğrulaması tamamlandı — build başlıyor"

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "app_env=production" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.API_URL_PRODUCTION }}" >> $GITHUB_OUTPUT
          else
            echo "app_env=staging" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.API_URL_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Build AAB (release)
        env:
          STORE_FILE: ../saydin-release.jks
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }} \
            --dart-define=API_BASE_URL=${{ steps.env.outputs.api_url }} \
            --dart-define=APP_ENV=${{ steps.env.outputs.app_env }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: saydin-${{ github.ref_name }}-${{ needs.version.outputs.version_name }}+${{ needs.version.outputs.build_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Prepare release notes for Play Store
        run: |
          mkdir -p whatsnew
          echo "${{ needs.release-notes.outputs.notes_tr }}" > whatsnew/whatsnew-tr-TR
          echo "${{ needs.release-notes.outputs.notes_en }}" > whatsnew/whatsnew-en-US

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.saydin.saydin
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.ref == 'refs/heads/main' && 'production' || 'internal' }}
          status: ${{ github.ref == 'refs/heads/main' && 'completed' || 'draft' }}
          whatsNewDirectory: whatsnew

  # ── iOS Release IPA + TestFlight (test + main push) ───────────────────────
  release-ios:
    name: Release iOS + TestFlight
    runs-on: macos-15
    needs: [version, analyze-and-test, release-notes]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/test' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Download provisioning profile
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id: com.saydin.saydin
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "app_env=production" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.API_URL_PRODUCTION }}" >> $GITHUB_OUTPUT
          else
            echo "app_env=staging" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.API_URL_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Build IPA (release)
        run: |
          flutter build ipa --release \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }} \
            --dart-define=API_BASE_URL=${{ steps.env.outputs.api_url }} \
            --dart-define=APP_ENV=${{ steps.env.outputs.app_env }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Find IPA path
        id: ipa
        run: echo "path=$(find build/ios/ipa -name '*.ipa' | head -1)" >> $GITHUB_OUTPUT

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: saydin-ios-${{ github.ref_name }}-${{ needs.version.outputs.version_name }}+${{ needs.version.outputs.build_number }}
          path: ${{ steps.ipa.outputs.path }}
          retention-days: 30

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Set TestFlight release notes
        env:
          ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          PRIVATE_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          NOTES_TR: ${{ needs.release-notes.outputs.notes_tr }}
          NOTES_EN: ${{ needs.release-notes.outputs.notes_en }}
          VERSION: ${{ needs.version.outputs.version_name }}
          BUILD_NUMBER: ${{ needs.version.outputs.build_number }}
        run: |
          # ── 1. JWT token oluştur (App Store Connect API) ───────────────
          HEADER=$(printf '{"alg":"ES256","kid":"%s","typ":"JWT"}' "$KEY_ID" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          NOW=$(date +%s)
          EXP=$((NOW + 1200))
          CLAIMS=$(printf '{"iss":"%s","iat":%d,"exp":%d,"aud":"appstoreconnect-v1"}' "$ISSUER_ID" "$NOW" "$EXP" | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          UNSIGNED="${HEADER}.${CLAIMS}"

          echo "$PRIVATE_KEY" > /tmp/asc_key.p8
          SIGNATURE=$(printf '%s' "$UNSIGNED" | openssl dgst -sha256 -sign /tmp/asc_key.p8 | openssl base64 -A | tr '+/' '-_' | tr -d '=')
          rm /tmp/asc_key.p8
          JWT="${UNSIGNED}.${SIGNATURE}"

          # ── 2. Build'i bul (processing bitene kadar bekle) ─────────────
          BUNDLE_ID="com.saydin.saydin"
          echo "⏳ Build ${VERSION}+${BUILD_NUMBER} App Store Connect'te aranıyor..."

          for i in $(seq 1 30); do
            BUILDS=$(curl -s \
              -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/builds?filter[version]=${BUILD_NUMBER}&filter[app]=$(
                curl -s -H "Authorization: Bearer $JWT" \
                  "https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]=${BUNDLE_ID}" \
                | jq -r '.data[0].id'
              )&limit=1")

            BUILD_ID=$(echo "$BUILDS" | jq -r '.data[0].id // empty')
            PROCESSING=$(echo "$BUILDS" | jq -r '.data[0].attributes.processingState // empty')

            if [ -n "$BUILD_ID" ] && [ "$PROCESSING" = "VALID" ]; then
              echo "✅ Build bulundu: $BUILD_ID"
              break
            fi
            echo "  Deneme $i/30 — durum: ${PROCESSING:-bulunamadı}, 30s bekleniyor..."
            sleep 30
          done

          if [ -z "$BUILD_ID" ]; then
            echo "⚠️  Build bulunamadı, release notes atlanıyor"
            exit 0
          fi

          # ── 3. Mevcut lokalizasyonları kontrol et ──────────────────────
          LOCALIZATIONS=$(curl -s \
            -H "Authorization: Bearer $JWT" \
            "https://api.appstoreconnect.apple.com/v1/builds/${BUILD_ID}/betaBuildLocalizations")

          # ── 4. TR lokalizasyonu ekle/güncelle ──────────────────────────
          TR_ID=$(echo "$LOCALIZATIONS" | jq -r '.data[] | select(.attributes.locale=="tr") | .id // empty')
          if [ -n "$TR_ID" ]; then
            curl -s -X PATCH \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              "https://api.appstoreconnect.apple.com/v1/betaBuildLocalizations/${TR_ID}" \
              -d "{\"data\":{\"type\":\"betaBuildLocalizations\",\"id\":\"${TR_ID}\",\"attributes\":{\"whatsNew\":$(echo "$NOTES_TR" | jq -Rs .)}}}"
          else
            curl -s -X POST \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              "https://api.appstoreconnect.apple.com/v1/betaBuildLocalizations" \
              -d "{\"data\":{\"type\":\"betaBuildLocalizations\",\"relationships\":{\"build\":{\"data\":{\"type\":\"builds\",\"id\":\"${BUILD_ID}\"}}},\"attributes\":{\"locale\":\"tr\",\"whatsNew\":$(echo "$NOTES_TR" | jq -Rs .)}}}"
          fi

          # ── 5. EN lokalizasyonu ekle/güncelle ──────────────────────────
          EN_ID=$(echo "$LOCALIZATIONS" | jq -r '.data[] | select(.attributes.locale=="en-US") | .id // empty')
          if [ -n "$EN_ID" ]; then
            curl -s -X PATCH \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              "https://api.appstoreconnect.apple.com/v1/betaBuildLocalizations/${EN_ID}" \
              -d "{\"data\":{\"type\":\"betaBuildLocalizations\",\"id\":\"${EN_ID}\",\"attributes\":{\"whatsNew\":$(echo "$NOTES_EN" | jq -Rs .)}}}"
          else
            curl -s -X POST \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              "https://api.appstoreconnect.apple.com/v1/betaBuildLocalizations" \
              -d "{\"data\":{\"type\":\"betaBuildLocalizations\",\"relationships\":{\"build\":{\"data\":{\"type\":\"builds\",\"id\":\"${BUILD_ID}\"}}},\"attributes\":{\"locale\":\"en-US\",\"whatsNew\":$(echo "$NOTES_EN" | jq -Rs .)}}}"
          fi

          echo "✅ TestFlight release notes eklendi (TR + EN)"

  # ── GitHub Release (test + main push, release'ler başarıyla tamamlandıktan sonra)
  # test  → v1.0.0-rc.42   (pre-release)
  # main  → v1.0.0         (production release)
  # Source code otomatik eklenir, AAB ve IPA artifact olarak indirilip eklenir.
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, release-notes, release-android, release-ios]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/test' || github.ref == 'refs/heads/main')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=v${{ needs.version.outputs.version_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=v${{ needs.version.outputs.version_name }}-rc.${{ needs.version.outputs.build_number }}" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Download Android AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: saydin-${{ github.ref_name }}-${{ needs.version.outputs.version_name }}+${{ needs.version.outputs.build_number }}
          path: release-assets/

      - name: Download iOS IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: saydin-ios-${{ github.ref_name }}-${{ needs.version.outputs.version_name }}+${{ needs.version.outputs.build_number }}
          path: release-assets/

      - name: Rename artifacts
        run: |
          mv release-assets/app-release.aab "release-assets/saydin-${{ steps.tag.outputs.tag }}.aab"
          mv release-assets/*.ipa "release-assets/saydin-${{ steps.tag.outputs.tag }}.ipa"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          body: |
            ## Release Notes

            ### 🇹🇷 Türkçe
            ${{ needs.release-notes.outputs.notes_tr }}

            ### 🇬🇧 English
            ${{ needs.release-notes.outputs.notes_en }}
          files: |
            release-assets/saydin-${{ steps.tag.outputs.tag }}.aab
            release-assets/saydin-${{ steps.tag.outputs.tag }}.ipa
