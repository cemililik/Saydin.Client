name: CI/CD

on:
  push:
    branches: [test, main]
  pull_request:
    branches: [development, test, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.4"

# ── Versiyon Yönetimi ─────────────────────────────────────────────────────────
#
# Semantic version (X.Y.Z) → pubspec.yaml içinde developer tarafından yönetilir.
# Build number            → github.run_number (otomatik, her zaman artan).
#
# Örnek: pubspec.yaml → version: 1.2.0+1
#        CI           → --build-name=1.2.0 --build-number=42
#
# Branch → ortam eşleşmesi:
#   development / PR  → APP_ENV=development, API_URL=vars.API_URL_STAGING
#   test              → APP_ENV=staging,     API_URL=vars.API_URL_STAGING
#   main              → APP_ENV=production,  API_URL=vars.API_URL_PRODUCTION
#
# GitHub Repository Variables (Settings → Secrets and variables → Variables):
#   API_URL_STAGING    = https://api-staging.saydin.app
#   API_URL_PRODUCTION = https://api.saydin.app
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Sürüm bilgisini çıkar ──────────────────────────────────────────────────
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.ver.outputs.version_name }}
      build_number: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from pubspec.yaml
        id: ver
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
          echo "version_name=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Build: ${{ github.run_number }}"

  # ── Analyze + Test ─────────────────────────────────────────────────────────
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    needs: version

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Dart format check
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Flutter analyze
        run: flutter analyze --fatal-infos

      - name: Flutter test
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false

  # ── Android Debug Build (development push + tüm PR'lar) ───────────────────
  build-android:
    name: Build Android APK (Debug)
    runs-on: ubuntu-latest
    needs: [version, analyze-and-test]
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/development')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Pre-install CMake
        run: yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

      - name: Build APK (debug)
        run: |
          flutter build apk --debug \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }} \
            --dart-define=API_BASE_URL=${{ vars.API_URL_STAGING }} \
            --dart-define=APP_ENV=development

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: saydin-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  # ── iOS Debug Build (development push + tüm PR'lar) ──────────────────────
  build-ios:
    name: Build iOS (no codesign)
    runs-on: macos-15
    needs: [version, analyze-and-test]
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/development')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --debug --no-codesign \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }} \
            --dart-define=API_BASE_URL=${{ vars.API_URL_STAGING }} \
            --dart-define=APP_ENV=development

  # ── Android Release AAB (test + main push) ────────────────────────────────
  release-android:
    name: Release Android AAB
    runs-on: ubuntu-latest
    needs: [version, analyze-and-test]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/test' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Pre-install CMake
        run: yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"

      - name: Prepare & verify signing
        env:
          KEYSTORE_B64:     ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD:   ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS:        ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:     ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # ── 1. Secret varlık kontrolü ──────────────────────────────────────
          missing=""
          [ -z "$KEYSTORE_B64" ]   && missing="$missing\n  - ANDROID_KEYSTORE_BASE64"
          [ -z "$STORE_PASSWORD" ] && missing="$missing\n  - ANDROID_STORE_PASSWORD"
          [ -z "$KEY_ALIAS" ]      && missing="$missing\n  - ANDROID_KEY_ALIAS"
          [ -z "$KEY_PASSWORD" ]   && missing="$missing\n  - ANDROID_KEY_PASSWORD"
          if [ -n "$missing" ]; then
            printf "❌ Eksik secret'lar:%b\n" "$missing"
            exit 1
          fi
          echo "✅ [1/4] Tüm secret'lar mevcut"

          # ── 2. Base64 decode ───────────────────────────────────────────────
          printf '%s' "$KEYSTORE_B64" | base64 --decode --ignore-garbage \
            > android/saydin-release.jks
          FILESIZE=$(wc -c < android/saydin-release.jks)
          echo "    Keystore boyutu: ${FILESIZE} bytes"
          if [ "$FILESIZE" -lt 100 ]; then
            echo "❌ [2/4] Decode başarısız — dosya ${FILESIZE} bytes, ANDROID_KEYSTORE_BASE64 hatalı"
            exit 1
          fi
          echo "✅ [2/4] Keystore decode edildi (${FILESIZE} bytes)"

          # ── 3. Store password + alias doğrulama ───────────────────────────
          if ! keytool -list \
                -keystore android/saydin-release.jks \
                -storepass "$STORE_PASSWORD" \
                -alias "$KEY_ALIAS" > /dev/null 2>&1; then
            echo "❌ [3/4] STORE_PASSWORD veya KEY_ALIAS hatalı"
            exit 1
          fi
          echo "✅ [3/4] Store password ve alias doğrulandı"

          # ── 4. Key password doğrulama ──────────────────────────────────────
          if ! keytool -keypasswd \
                -keystore android/saydin-release.jks \
                -storepass "$STORE_PASSWORD" \
                -alias "$KEY_ALIAS" \
                -keypass "$KEY_PASSWORD" \
                -new "$KEY_PASSWORD" > /dev/null 2>&1; then
            echo "❌ [4/4] KEY_PASSWORD hatalı"
            exit 1
          fi
          echo "✅ [4/4] Key password doğrulandı"
          echo ""
          echo "🎉 Signing doğrulaması tamamlandı — build başlıyor"

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "app_env=production" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.API_URL_PRODUCTION }}" >> $GITHUB_OUTPUT
          else
            echo "app_env=staging" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.API_URL_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Build AAB (release)
        env:
          STORE_FILE: ../saydin-release.jks
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }} \
            --dart-define=API_BASE_URL=${{ steps.env.outputs.api_url }} \
            --dart-define=APP_ENV=${{ steps.env.outputs.app_env }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: saydin-${{ github.ref_name }}-${{ needs.version.outputs.version_name }}+${{ needs.version.outputs.build_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.saydin.saydin
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.ref == 'refs/heads/main' && 'production' || 'internal' }}
          status: completed

  # ── iOS Release IPA + TestFlight (test + main push) ───────────────────────
  release-ios:
    name: Release iOS + TestFlight
    runs-on: macos-15
    needs: [version, analyze-and-test]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/test' || github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Download provisioning profile
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id: com.saydin.saydin
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "app_env=production" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.API_URL_PRODUCTION }}" >> $GITHUB_OUTPUT
          else
            echo "app_env=staging" >> $GITHUB_OUTPUT
            echo "api_url=${{ vars.API_URL_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Build IPA (release)
        run: |
          flutter build ipa --release \
            --build-name=${{ needs.version.outputs.version_name }} \
            --build-number=${{ needs.version.outputs.build_number }} \
            --dart-define=API_BASE_URL=${{ steps.env.outputs.api_url }} \
            --dart-define=APP_ENV=${{ steps.env.outputs.app_env }} \
            --export-options-plist=ios/ExportOptions.plist

      - name: Find IPA path
        id: ipa
        run: echo "path=$(find build/ios/ipa -name '*.ipa' | head -1)" >> $GITHUB_OUTPUT

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

  # ── Git Tag (test + main push, release'ler başarıyla tamamlandıktan sonra) ─
  # test  → v1.0.0-rc.42   (release candidate)
  # main  → v1.0.0         (production release)
  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: [version, release-android, release-ios]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/test' || github.ref == 'refs/heads/main')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create and push release tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAG="v${{ needs.version.outputs.version_name }}"
          else
            TAG="v${{ needs.version.outputs.version_name }}-rc.${{ needs.version.outputs.build_number }}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" -m "Release $TAG (build ${{ needs.version.outputs.build_number }})"
          git push origin "$TAG" --force
